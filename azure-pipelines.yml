trigger: 
- main
pool:
 name: UbuntuVM
variables:
 buildConfiguration: 'Release'
steps:
- task: UseDotNet@2
  displayName: "Use .Net SDK 6.x"
  inputs:
    packageType: sdk
    version: '6.x'
- task: DotNetCoreCLI@2
  displayName: "Verifie if .Net6 is Here"
  inputs:
    arguments: '--version'
  

